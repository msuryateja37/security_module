name: CI/CD Pipeline - DLRRD Security Module

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-validate:
    name: Build and Validate Application
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter (oxlint)
        run: npm run lint

      - name: Build Application (Vite UI & TS Server)
        run: npm run build

      - name: Package Deployment Files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp -r dist-server deploy/dist-server
          cp index.js deploy/index.js
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json
          cp database_mssql.sql deploy/database_mssql.sql
          cp web.config deploy/web.config

      - name: Upload Build Artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy/
          retention-days: 1

  deploy-to-azure:
    name: Deploy to Azure App Service
    needs: build-and-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: ./deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'securitymodule'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C3C602535AD64640BB65EACAE65B1A65 }}
          package: ./deploy


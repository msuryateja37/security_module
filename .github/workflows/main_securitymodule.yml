name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application (React UI & Express Server)
        run: npm run build

      - name: Package Deployment Files
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp -r dist-server deploy/dist-server
          cp index.js deploy/index.js
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json
          cp database_mssql.sql deploy/database_mssql.sql
          
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }} # e.g., dlrrd-security-module
          package: ./deploy
